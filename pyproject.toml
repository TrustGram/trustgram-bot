[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
ignore = [
    "E501",  # line length — handled by formatter
    "B008",  # Depends() in defaults — standard FastAPI pattern
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["F841"]  # unused variables in test setup are acceptable

[tool.ruff.format]
quote-style = "double"
