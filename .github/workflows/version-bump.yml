# ── Auto Version Bump ─────────────────────────────────────────
#
# After a successful Release, bump the patch version in VERSION
# on the develop branch so the next dev cycle starts fresh.
#
# Example: release publishes v0.1.0 → develop is bumped to 0.1.1

name: Version Bump

on:
  workflow_run:
    workflows: [Release]
    types: [completed]

jobs:
  bump:
    name: Bump patch version on develop
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump VERSION
        run: |
          VERSION=$(cat VERSION)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "$NEW_VERSION" > VERSION
          echo "Bumped $VERSION → $NEW_VERSION"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to $(cat VERSION) [skip ci]"
          git push origin develop
