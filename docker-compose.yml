# ── TrustGram Bot — Docker Compose ────────────────────────────
#
# Local development stack with PostgreSQL.
#
#   docker compose up            → start db + app
#   docker compose up -d db      → start only Postgres (use local venv for app)
#   docker compose down -v       → stop & remove volumes
#
# The app container runs Alembic migrations on startup automatically.

services:
  db:
    image: postgres:16-alpine
    container_name: trustgram-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: trustgram
      POSTGRES_PASSWORD: trustgram
      POSTGRES_DB: trustgram
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - trustgram-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustgram"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: trustgram-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://trustgram:trustgram@db:5432/trustgram
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - trustgram-net

volumes:
  pgdata:

networks:
  trustgram-net:
    driver: bridge
