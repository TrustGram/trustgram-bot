# ── Render Blueprint ──────────────────────────────────────────
#
# Infrastructure-as-Code for Render.  When you connect this repo
# to Render via "New → Blueprint", it reads this file and provisions:
#   1. A Docker-based web service (trustgram-bot).
#   2. A managed PostgreSQL database (trustgram-db).
#
# Manual secrets (BOT_TOKEN, WEBAPP_URL, DOCS_API_KEY) must still
# be set in the Render dashboard — they are marked `sync: false`.
#
# Docs: https://docs.render.com/blueprint-spec

services:
  - type: web
    name: trustgram-bot
    runtime: docker
    repo: https://github.com/TrustGram/trustgram-bot
    branch: main
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trustgram-db
          property: connectionString
        # Render gives a psycopg2 URL — override to asyncpg at deploy time.
        # See deployment docs for the manual step.
      - key: BOT_TOKEN
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DOCS_API_KEY
        sync: false
      - key: LOG_TO_FILE
        value: "false"
      - key: LOG_TO_CONSOLE
        value: "true"
      - key: LOG_LEVEL
        value: "INFO"

databases:
  - name: trustgram-db
    plan: free
    databaseName: trustgram
    user: trustgram
