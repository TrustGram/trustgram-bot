# Alembic configuration for TrustGram.
#
# The actual database URL is loaded at runtime from app.core.config.settings
# by alembic/env.py — the placeholder below is intentionally unused.

[alembic]
script_location = alembic
prepend_sys_path = .
# Overridden in env.py — kept here as fallback / documentation only.
sqlalchemy.url = sqlite+aiosqlite:///./trustgram.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s | %(levelname)-8s | %(name)s — %(message)s
datefmt = %Y-%m-%d %H:%M:%S
